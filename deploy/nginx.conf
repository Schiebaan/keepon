# =============================================================================
# Nginx configuratie voor RunON — runon.nl
# =============================================================================

# --- Redirect www.runon.nl -> runon.nl (HTTPS) ---
server {
    listen 80;
    listen [::]:80;
    server_name www.runon.nl;
    return 301 https://runon.nl$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.runon.nl;

    ssl_certificate     /etc/letsencrypt/live/runon.nl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/runon.nl/privkey.pem;

    return 301 https://runon.nl$request_uri;
}

# --- Redirect HTTP -> HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name runon.nl *.runon.nl;
    return 301 https://$host$request_uri;
}

# --- Hoofdconfiguratie: runon.nl + subdomains ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name runon.nl *.runon.nl;

    # --- SSL (Let's Encrypt) ---
    ssl_certificate     /etc/letsencrypt/live/runon.nl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/runon.nl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout    5s;

    # --- Security headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # --- Gzip compressie ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml
        font/woff2;

    # --- Statische assets met lange cache (Nuxt build output) ---
    location /_nuxt/ {
        proxy_pass http://127.0.0.1:3000;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- Favicon en robots ---
    location = /favicon.ico {
        proxy_pass http://127.0.0.1:3000;
        expires 7d;
        access_log off;
    }

    location = /robots.txt {
        proxy_pass http://127.0.0.1:3000;
        expires 1d;
        access_log off;
    }

    # --- WebSocket support (live updates / HMR in dev) ---
    location /_ws {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # --- Proxy naar Nuxt/Nitro ---
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # --- Logs ---
    access_log /var/log/nginx/runon.access.log;
    error_log  /var/log/nginx/runon.error.log;

    # --- Max upload grootte (bijv. logo uploads) ---
    client_max_body_size 10M;
}
